<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta charset="UTF-8">
    <title>QuizApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>QuizApp</h1>
    </header>
    <main class="main">
        <section class="container">
            <div>
                <div>
                    <img src="../pictures/question-icon.svg" alt="question-icon">
                    <h2 id="qNoShow"></h2>
                </div>
                <h2 id="scoreShow">Score:</h2>
                <div><span id="hoursShow"></span><span>:</span><span id="minutesShow"></span><span>:</span><span id="secondsShow"></span></div>
            </div>
            
            <span id="questionShow"><span>1- </span></span>

            <span>Please choose one of the following answers:</span>

            <div>
                <div class="enabled-options">
                    <span>A.</span>
                    <span class="options"></span>
                </div>

                <div class="enabled-options">
                    <span>B.</span>
                    <span class="options"></span>
                </div>

                <div class="enabled-options">
                    <span>C.</span>
                    <span class="options"></span>
                </div>

                <div class="enabled-options">
                    <span>D.</span>
                    <span class="options"></span>
                </div>
            </div>

            <span></span>

            <div>
                <button class="container__button">
                    <img src="../pictures/next-icon.svg" alt="next-icon">
                    <span>Next</span>
                </button>
            </div>
        </section>
    </main>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
