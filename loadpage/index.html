<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta charset="UTF-8">
    <title>QuizApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>QuizApp</h1>
    </header>
    <main class="main">
        <section>
            <div class="progress-container">
                    <svg class="progress-svg" width="4rem" height="4rem">
                    <circle class="progress-bg" cx="2rem" cy="2rem" r="1.6rem"></circle>
                    <circle class="progress-bar" cx="2rem" cy="2rem" r="1.6rem"></circle>
                </svg>
                <div class="percentage">0%</div>
            </div>
            <div>
                <h2 id="message">Loading your quiz...</h2>
                <p>It won't be long!</p>
            </div>
        </section>
    </main>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
